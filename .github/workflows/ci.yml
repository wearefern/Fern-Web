name: CI

on:
  push:
    branches: [before-redirects, main]
  pull_request:
    branches: [before-redirects, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Build
        run: pnpm build
